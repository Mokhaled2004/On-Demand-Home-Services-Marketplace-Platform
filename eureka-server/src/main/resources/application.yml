spring:
  application:
    name: eureka-server
  cloud:
    compatibility-verifier:
      enabled: false

server:
  port: 8761

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 3000

logging:
  level:
    root: INFO
